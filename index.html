<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub PR Analyzer</title>
<style>
:root {
  --bg:     #ffffff;
  --surf:   #f3f4f6;
  --border: #9ca3af;
  --text:   #0d0d0d;
  --muted:  #374151;
  --blue:   #1d4ed8;
  --green:  #15803d;
  --orange: #b45309;
  --purple: #6d28d9;
  --mono: 'Cascadia Code','Fira Code','Consolas',monospace;
  --sans: -apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:18px;line-height:1.45}

#app{display:flex;flex-direction:column;height:100vh}
#progress-bar{height:5px;background:#e5e7eb;flex-shrink:0}
#progress-fill{height:100%;background:var(--blue);transition:width .3s}

#slide-area{flex:1;display:flex;align-items:center;justify-content:center;padding:16px;overflow:hidden}
.slide{width:900px;flex-shrink:0;animation:fi .18s ease}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

#controls{display:flex;align-items:center;justify-content:center;gap:24px;padding:14px;border-top:2px solid #e5e7eb;background:var(--surf);flex-shrink:0}
.btn{background:#fff;border:2px solid var(--border);color:var(--text);padding:7px 30px;border-radius:6px;cursor:pointer;font-size:22px;font-weight:700;font-family:var(--sans);transition:all .12s}
.btn:hover:not(:disabled){background:var(--blue);border-color:var(--blue);color:#fff}
.btn:disabled{opacity:.2;cursor:default}
#counter{color:var(--muted);font-family:var(--mono);font-size:14px;min-width:70px;text-align:center;font-weight:600}

/* titles */
.stitle{font-size:2em;font-weight:900;color:var(--blue);margin-bottom:26px;padding-bottom:12px;border-bottom:3px solid var(--blue);line-height:1.15}
.smission{font-family:var(--mono);font-size:.78em;color:var(--muted);font-weight:600;margin-bottom:14px}
.badge{font-size:.42em;background:var(--green);color:#fff;padding:3px 12px;border-radius:10px;font-family:var(--mono);font-weight:700;vertical-align:middle;margin-left:10px}

/* cover */
.cover{text-align:center}
.ctitle{font-size:2.8em;font-weight:900;color:var(--blue);margin-bottom:10px;line-height:1.1}
.csub{font-size:1em;color:var(--muted);font-weight:600;margin-bottom:6px}
.cextra{font-family:var(--mono);font-size:.75em;color:var(--muted);margin-bottom:28px}

/* table */
table{width:100%;border-collapse:collapse;margin:14px 0}
th{background:var(--blue);color:#fff;padding:11px 16px;text-align:left;font-size:.9em;font-weight:700}
td{padding:11px 16px;border-bottom:2px solid #e5e7eb;font-size:.95em}
tr:last-child td{border-bottom:none}
.dbadge{font-family:var(--mono);font-size:.78em;background:var(--blue);color:#fff;padding:3px 10px;border-radius:8px;font-weight:700}
.mono{font-family:var(--mono);font-weight:600;color:var(--purple)}
.green{color:var(--green);font-weight:700}

/* bullets */
ul.b{list-style:none;margin:16px 0}
ul.b li{padding:10px 0 10px 28px;position:relative;border-bottom:1px solid #e5e7eb;font-size:1.05em;font-weight:500}
ul.b li:last-child{border-bottom:none}
ul.b li::before{content:'▸';position:absolute;left:0;color:var(--blue);font-size:1.1em;font-weight:900}
ul.b li.ok::before{content:'✓';color:var(--green)}

/* quote */
.quote{background:var(--surf);border-left:6px solid var(--blue);padding:18px 22px;border-radius:0 8px 8px 0;margin:18px 0;font-size:1.05em;font-weight:600;color:var(--text)}

/* code */
pre.code{background:#f8fafc;border:2px solid var(--border);border-radius:8px;padding:20px 22px;overflow-x:auto;font-family:var(--mono);font-size:.78em;line-height:1.7;margin:16px 0;position:relative}
pre.code .lang{position:absolute;top:8px;right:12px;color:var(--border);font-size:.75em;font-weight:700}
.kw{color:var(--purple);font-weight:700}
.st{color:var(--green);font-weight:600}
.cm{color:var(--muted);font-style:italic}
.nm{color:var(--orange)}
.tp{color:var(--orange)}

/* arch */
pre.arch{background:var(--surf);border:2px solid var(--border);border-radius:8px;padding:22px 26px;font-family:var(--mono);font-size:.8em;line-height:1.85;color:var(--text);font-weight:600}

/* step list */
.steps{list-style:none;margin:16px 0;counter-reset:s}
.steps li{counter-increment:s;padding:12px 16px 12px 52px;position:relative;margin-bottom:10px;background:var(--surf);border-radius:8px;border-left:5px solid var(--blue);font-weight:600;font-size:1em}
.steps li::before{content:counter(s);position:absolute;left:14px;top:50%;transform:translateY(-50%);background:var(--blue);color:#fff;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8em;font-weight:900;line-height:26px;text-align:center}

/* perf */
.result{color:var(--green);font-weight:700;margin-top:16px;font-size:1em;padding:13px 18px;background:#f0fdf4;border-radius:8px;border-left:5px solid var(--green)}

/* guardrail */
.gsec{margin-top:12px;background:var(--surf);border:2px solid #e5e7eb;border-left:5px solid var(--blue);border-radius:0 8px 8px 0;padding:12px 16px}
.gsec-title{color:var(--blue);font-weight:700;font-size:.88em;margin-bottom:4px}
.gsec-body{color:var(--muted);font-size:.85em;font-weight:500}

/* claudinho */
.claudinho{margin-top:16px;background:#f0fdf4;border:2px solid var(--green);border-radius:8px;padding:14px 18px}
.claudinho-cmd{font-family:var(--mono);color:var(--muted);font-size:.75em;margin-bottom:8px;font-weight:600}
.claudinho-msg{font-size:.88em;line-height:1.6;color:var(--green);font-weight:700}

/* closing */
.closing{text-align:center;display:flex;flex-direction:column;align-items:center;gap:30px}
.closing-title{font-size:4.5em;font-weight:900;color:var(--blue)}
.closing-quote{font-style:italic;color:var(--muted);max-width:620px;line-height:1.7;font-size:.95em;font-weight:500}
.closing-repo{font-family:var(--mono);color:var(--blue);font-size:.82em;font-weight:700}
</style>
</head>
<body>
<div id="app">
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <div id="slide-area"></div>
  <div id="controls">
    <button class="btn" id="bp">←</button>
    <span id="counter"></span>
    <button class="btn" id="bn">→</button>
  </div>
</div>

<script>
const KW=new Set(['def','class','return','yield','from','import','with','as','for','if','else','elif','lambda','None','True','False','and','or','not','in','is','raise','async','await','pass','while','try','except','finally','reduce']);
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function hi(src){
  let out='',i=0;
  while(i<src.length){
    const c=src[i];
    if(c==='#'){let j=i;while(j<src.length&&src[j]!=='\n')j++;out+=`<span class="cm">${esc(src.slice(i,j))}</span>`;i=j;continue;}
    if(c==='"'||c==="'"){let j=i+1;while(j<src.length&&src[j]!==c){if(src[j]==='\\')j++;j++;}j++;out+=`<span class="st">${esc(src.slice(i,j))}</span>`;i=j;continue;}
    if(/\d/.test(c)&&(i===0||!/\w/.test(src[i-1]))){let j=i;while(j<src.length&&/[\d.]/.test(src[j]))j++;out+=`<span class="nm">${esc(src.slice(i,j))}</span>`;i=j;continue;}
    if(/[a-zA-Z_]/.test(c)){let j=i;while(j<src.length&&/\w/.test(src[j]))j++;const w=src.slice(i,j);out+=KW.has(w)?`<span class="kw">${w}</span>`:esc(w);i=j;continue;}
    out+=esc(c);i++;
  }
  return out;
}
function bul(arr){
  return '<ul class="b">'+arr.map(t=>{
    const ok=t.startsWith('✓');
    const h=t.replace(/`([^`]+)`/g,'<code style="font-family:var(--mono);color:var(--purple);background:#ede9fe;padding:1px 6px;border-radius:4px">$1</code>').replace(/\*\*([^*]+)\*\*/g,'<strong style="color:var(--blue)">$1</strong>');
    return `<li${ok?' class="ok"':''}>${h}</li>`;
  }).join('')+'</ul>';
}

const R={
cover(s){return`<div class="slide cover">
  <div class="ctitle">${s.title}</div>
  <div class="csub">${s.subtitle}</div>
  <div class="cextra">${s.extra}</div>
  <table><thead><tr><th>Dev</th><th>Módulo</th></tr></thead>
  <tbody>${s.team.map(t=>`<tr><td><span class="dbadge">${t.dev}</span></td><td class="mono">${t.module}</td></tr>`).join('')}</tbody></table>
</div>`;},

problem(s){return`<div class="slide">
  <h2 class="stitle">${s.title}</h2>
  ${bul(s.questions)}
</div>`;},

architecture(s){return`<div class="slide">
  <h2 class="stitle">${s.title}</h2>
  <pre class="arch">${s.diagram}</pre>
</div>`;},

'ai-strategy'(s){return`<div class="slide">
  <h2 class="stitle">${s.title}</h2>
  <div class="quote">${s.answer}</div>
  ${bul(s.steps)}
</div>`;},

'dev-code'(s){return`<div class="slide">
  <h2 class="stitle">${s.title}</h2>
  <p class="smission">${s.module} — ${s.mission}</p>
  <pre class="code"><span class="lang">python</span>${hi(s.code)}</pre>
  ${s.bullets?bul(s.bullets):''}
</div>`;},

'strategy-practice'(s){return`<div class="slide">
  <h2 class="stitle">${s.title}</h2>
  <ol class="steps">${s.steps.map(t=>`<li>${t}</li>`).join('')}</ol>
  <table style="margin-top:14px"><thead><tr><th>Dev</th><th>Módulo</th></tr></thead>
  <tbody>${s.devs.map(d=>`<tr><td><span class="dbadge">${d.dev}</span></td><td class="mono">${d.module}</td></tr>`).join('')}</tbody></table>
</div>`;},

'table-slide'(s){return`<div class="slide">
  <h2 class="stitle">${s.title}${s.badge?`<span class="badge">${s.badge}</span>`:''}</h2>
  <table><thead><tr>${s.headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
  <tbody>${s.rows.map(r=>`<tr>${r.map((c,i)=>`<td${i===r.length-1?' class="green"':''}>${c}</td>`).join('')}</tr>`).join('')}</tbody></table>
</div>`;},

performance(s){return`<div class="slide">
  <h2 class="stitle">${s.title}</h2>
  <p style="color:var(--muted);font-size:.9em;font-weight:600;margin-bottom:14px">${s.problem}</p>
  <table><thead><tr>${s.headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
  <tbody>${s.rows.map(r=>`<tr><td>${r[0]}</td><td class="green">${r[1]}</td></tr>`).join('')}</tbody></table>
  <div class="result">✓ ${s.result}</div>
</div>`;},

guardrails(s){return`<div class="slide">
  <h2 class="stitle">${s.title}</h2>
  <p style="color:var(--muted);font-weight:600;font-size:.88em;margin-bottom:12px">${s.intro}</p>
  <pre class="code"><span class="lang">python</span>${hi(s.code)}</pre>
  ${s.sections.map(sec=>`<div class="gsec"><div class="gsec-title">${sec.title}</div><div class="gsec-body">${sec.body}</div></div>`).join('')}
</div>`;},

dashboard(s){return`<div class="slide">
  <h2 class="stitle">${s.title}</h2>
  <table><thead><tr><th>Componente</th><th>Função</th></tr></thead>
  <tbody>${s.features.map(f=>`<tr><td class="mono">${f.name}</td><td>${f.desc}</td></tr>`).join('')}</tbody></table>
  <div class="claudinho">
    <div class="claudinho-cmd">💬 ${s.claudinho}</div>
    <div class="claudinho-msg">${s.claudinho_resp}</div>
  </div>
</div>`;},

results(s){return`<div class="slide">
  <h2 class="stitle">${s.title}</h2>
  <table><thead><tr><th>Métrica</th><th>Resultado</th></tr></thead>
  <tbody>${s.metrics.map(m=>`<tr><td>${m.label}</td><td class="green">${m.value}</td></tr>`).join('')}</tbody></table>
</div>`;},

'next-steps'(s){return`<div class="slide">
  <h2 class="stitle">${s.title}</h2>
  ${bul(s.pending)}
  <div style="margin-top:22px;background:var(--surf);border:2px solid var(--border);border-radius:8px;padding:16px 20px;font-family:var(--mono);color:var(--blue);font-weight:700;font-size:.88em">${s.repo}</div>
</div>`;},

closing(s){return`<div class="slide closing">
  <div class="closing-title">${s.title}</div>
  <div class="closing-quote">"${s.quote}"</div>
  <div class="closing-repo">${s.repo}</div>
</div>`;}
};

const SLIDES=[{"id":1,"type":"cover","title":"GitHub PR Analyzer","subtitle":"Paradigma Funcional + LLMs","extra":"AL0337 · UNIPAMPA · v7.0.0 · Entrega 01/06/2026","team":[{"dev":"dev1","module":"io/ — Ingestão lazy"},{"dev":"dev2","module":"transforms/ — Funções puras"},{"dev":"dev3","module":"llm/ — Classificação"},{"dev":"dev4","module":"cache/ pipeline/"},{"dev":"dev5","module":"ui/ — Dashboard"}]},{"id":2,"type":"problem","title":"O Problema","questions":["📦 Que tipo de projeto é esse?","🔧 Qual a natureza de cada PR?","📝 A descrição é clara?"]},{"id":3,"type":"architecture","title":"A Solução","diagram":"  Dataset CSV/JSON\n       │\n       ▼\n  io/          leitura lazy — sem carregar tudo na RAM\n       │\n       ▼\n  transforms/  filter · map · reduce puros\n       │\n       ▼\n  pipeline/    compose() orquestra tudo\n       │\n       ├──▶  cache/   SHA-256 + SQLite\n       │\n       └──▶  llm/     Groq ou Ollama\n       │\n       ▼\n  ui/          Dashboard Streamlit"},{"id":4,"type":"ai-strategy","title":"Estratégia: Guardrails Primeiro","answer":"Cada dev usa a IA que quiser — os hooks garantem o padrão.","steps":["CLAUDE.md define arquitetura + regras FP001–FP006","50 tasks criadas antes da Sprint 1","✓ Pre-commit hooks julgam o resultado — independente da IA"]},{"id":5,"type":"dev-code","title":"dev1 — Ingestão Lazy","module":"io/","mission":"milhões de PRs · zero RAM extra","code":"def read_prs(path: Path) -> Generator[PRRecord, None, None]:\n    with open(path, encoding=\"utf-8\") as f:\n        yield from (\n            _parse_row(row)\n            for row in csv.DictReader(f)\n            if _is_valid(row)\n        )","bullets":["Um registro em memória por vez"]},{"id":6,"type":"strategy-practice","title":"Como Funcionou na Prática","steps":["Enunciado completo → CLAUDE.md gerado","50 tasks definidas antes da Sprint 1","Cada dev escolheu sua IA"],"devs":[{"dev":"dev1","module":"io/"},{"dev":"dev2","module":"transforms/"},{"dev":"dev3","module":"llm/"},{"dev":"dev4","module":"cache/ pipeline/"},{"dev":"dev5","module":"ui/"}]},{"id":7,"type":"dev-code","title":"dev2 — Transformações Puras","module":"transforms/","mission":"zero for · zero while · zero .append()","code":"def filter_by_state(state: str) -> Callable[[PRRecord], bool]:\n    return lambda pr: pr.state == state.lower().strip()\n\ndef count_by_language(prs: tuple[PRRecord, ...]) -> dict[str, int]:\n    return reduce(\n        lambda acc, pr: acc | {pr.language: acc.get(pr.language, 0) + 1},\n        prs, {}\n    )","bullets":["Heurísticas eliminam 10–30% das chamadas ao LLM"]},{"id":8,"type":"dev-code","title":"dev2 — Property-Based Testing","module":"transforms/","mission":"Hypothesis gera centenas de inputs aleatórios","code":"@given(st.lists(st.from_type(PRRecord)))\ndef test_count_never_loses_prs(prs: list[PRRecord]) -> None:\n    counts = count_by_language(tuple(prs))\n    assert sum(counts.values()) == len(prs)","bullets":["Cobertura ~100% incluindo edge cases"]},{"id":9,"type":"table-slide","title":"dev3 — 4 Classificações por PR","headers":["Dimensão","Valores"],"rows":[["Tipo de projeto","biblioteca · web · CLI · infra"],["Natureza","bug fix · feature · refatoração · docs"],["Clareza","insuficiente · básica · boa · excelente"],["Complexidade ⭐","low · medium · high  (sem LLM)"]]},{"id":10,"type":"performance","title":"dev3 — 5h → 12 minutos","problem":"2.000 PRs sequencialmente = ~5 horas.","headers":["O que mudou","Ganho"],"rows":[["asyncio.gather","2–4× throughput"],["Heurísticas antes do LLM","−30% chamadas"],["Cache por repositório","−33% tokens"]],"result":"~12 min na 1ª execução · instantâneo nas seguintes"},{"id":11,"type":"dev-code","title":"dev4 — Cache + Pipeline","module":"cache/ + pipeline/","mission":"nunca classificar o mesmo PR duas vezes","code":"def make_cache_key(*args: str) -> str:\n    return hashlib.sha256(\"\\x00\".join(args).encode()).hexdigest()\n\ndef compose(*fns: Callable) -> Callable:\n    return reduce(lambda f, g: lambda x: g(f(x)), fns, lambda x: x)","bullets":["SQLite WAL · thread-safe · sobrevive ao Docker rebuild"]},{"id":12,"type":"guardrails","title":"dev4 — Os Guardrails","intro":"Código que viole o paradigma nunca chega ao repositório.","code":"# Bloqueia no commit:\n# ast.For / ast.While em transforms/ ou pipeline/\n# .append() .update() .pop()\n# open() fora de io/ ou ui/","sections":[{"title":"Entrada ⭐ (Gift)","body":"sanitize() + validate_pr() — PRs corrompidos rejeitados antes do LLM."},{"title":"Push","body":"pytest no Docker · cobertura < 80% bloqueia o merge."}]},{"id":13,"type":"dashboard","title":"dev5 — Dashboard","module":"ui/ — Streamlit","features":[{"name":"Upload","desc":"CSV · JSON · archives até 11 GB"},{"name":"Escala","desc":"500 / 2k / 10k / 50k PRs"},{"name":"Backend","desc":"Groq ☁️ ou Ollama 💻"},{"name":"complexity ⭐","desc":"low / medium / high por PR"},{"name":"Export","desc":"CSV ou JSON enriquecido"}],"claudinho":"/claudinho merge concluído, cobertura em 88%","claudinho_resp":"Galera, 88%! 🎉 Sprint final em 4 dias — bora! 💪  — Claudinho 🤖"},{"id":14,"type":"results","title":"Resultados","metrics":[{"label":"Cobertura geral","value":"89%"},{"label":"transforms/ pipeline/","value":"~100%"},{"label":"2.000 PRs (1ª vez)","value":"~12 min"},{"label":"2.000 PRs (cache)","value":"instantâneo"},{"label":"Hooks ativos","value":"10"},{"label":"Sprints entregues","value":"6 + gift-merge"}]},{"id":15,"type":"next-steps","title":"Próximos Passos","pending":["Benchmark automático de modelos (LLM-08)","Model routing adaptativo (LLM-11)","Testes end-to-end com dataset completo"],"repo":"github.com/frebarcelos/marco-2-rp3"},{"id":16,"type":"closing","title":"Obrigado!","quote":"Aprender a pensar funcionalmente, testar antes de implementar e trabalhar com IA sem perder o controle do código.","repo":"github.com/frebarcelos/marco-2-rp3"}];

let cur=0;

function scaleSlide(){
  const area=document.getElementById('slide-area');
  const slide=area.querySelector('.slide');
  if(!slide) return;
  slide.style.zoom='1';
  const availW=area.clientWidth-32;
  const availH=area.clientHeight-32;
  const nW=slide.offsetWidth;
  const nH=slide.offsetHeight;
  slide.style.zoom=String(Math.min(availW/nW, availH/nH));
}

function render(){
  const s=SLIDES[cur],fn=R[s.type];
  document.getElementById('slide-area').innerHTML=fn?fn(s):`<div class="slide"><h2 class="stitle">${s.title}</h2></div>`;
  document.getElementById('counter').textContent=`${cur+1} / ${SLIDES.length}`;
  document.getElementById('progress-fill').style.width=`${((cur+1)/SLIDES.length)*100}%`;
  document.getElementById('bp').disabled=cur===0;
  document.getElementById('bn').disabled=cur===SLIDES.length-1;
  scaleSlide();
}

window.addEventListener('resize', scaleSlide);
document.getElementById('bp').onclick=()=>{if(cur>0){cur--;render();}};
document.getElementById('bn').onclick=()=>{if(cur<SLIDES.length-1){cur++;render();}};
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();if(cur<SLIDES.length-1){cur++;render();}}
  if(e.key==='ArrowLeft'){e.preventDefault();if(cur>0){cur--;render();}}
  if(e.key==='Home'){cur=0;render();}
  if(e.key==='End'){cur=SLIDES.length-1;render();}
});
render();
</script>
</body>
</html>
